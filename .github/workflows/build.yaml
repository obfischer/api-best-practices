---
name: Build Antora Project
'on':
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Build Antora project"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Validate YAML Files
        run: |
          find . -name '*.yaml' -type f | \
            while IFS= read -r file;
            do
              yamllint --strict $file;
          done
      - name: Validate Data Files
        run: ./modules/standards/bin/validate-data-files.sh
      - name: Check sorting of Data Files
        run: ./modules/standards/bin/sort-data-files.sh
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install Antora
        run: npm clean-install
      - name: Generate Site
        run: npx antora --stacktrace antora-playbook.yml
