  - title: HTTP/2 - RFC 9113
    asciidocfile: rfc-9113-http-2.adoc
    year: "2022"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc9113
    description: |
      This specification describes an optimized expression of the semantics of
      the Hypertext Transfer Protocol (HTTP), referred to as HTTP version 2
      (HTTP/2). HTTP/2 enables a more efficient use of network resources and  a
      reduced latency by introducing field compression and allowing multiple
      concurrent exchanges on the same connection.
    type: Proposed Standard
    topics:
      - HTTP Protocol
  - title: HTTP/3 - RFC 9114
    asciidocfile: rfc-9114-http-3.adoc
    year: "2022"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc9114
    description: |
      The QUIC transport protocol has several features that are desirable  in a
      transport for HTTP, such as stream multiplexing, per-stream flow  control,
      and low-latency connection establishment. This document  describes a
      mapping of HTTP semantics over QUIC. This document  also identifies HTTP/2
      features that are subsumed by QUIC and  describes how HTTP/2 extensions
      can be ported to HTTP/3.
    type: Proposed Standard
    topics:
      - HTTP Protocol
