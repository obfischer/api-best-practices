  - title: Hypertext Transfer Protocol -- HTTP/1.0 - RFC 1945
    asciidocfile: rfc-1945-hypertext-transfer-protocol-http-1.0.adoc
    year: "1996"
    status: obsolete
    type: Informational
    url: https://datatracker.ietf.org/doc/html/rfc1945
    description: |
      The Hypertext Transfer Protocol (HTTP) is an application-level protocol
      with the lightness  and speed necessary for distributed, collaborative,
      hypermedia information systems. It i s a generic, stateless,
      object-oriented protocol which can be used for many tasks, such  as name
      servers and distributed object management systems, through extension of
      its  request methods (commands). A feature of HTTP is the typing of data
      representation, allowing  systems to be built independently of the data
      being transferred. HTTP has been in use by  the World-Wide Web global
      information initiative since 1990. This specification reflects  common
      usage of the protocol referred to as "HTTP/1.0".
    topics:
      - HTTP Protocol
  - title: Hypertext Transfer Protocol -- HTTP/1.1 - RFC 2068
    asciidocfile: rfc-2068-hypertext-transfer-protocol-http-1.1.adoc
    url: https://datatracker.ietf.org/doc/html/rfc2068
    description: |
      The Hypertext Transfer Protocol (HTTP) is an application-level protocol
      for distributed, collaborative, hypermedia information systems. It is a
      generic, stateless, object-oriented protocol which can be used for many
      tasks, such as name servers and distributed object management systems,
      through extension of its request methods. A feature of HTTP is the  typing
      and negotiation of data representation, allowing systems to be built
      independently of the data being transferred. HTTP has been  in use by the
      World-Wide Web global information initiative since 1990.  This
      specification defines the protocol referred to as "HTTP/1.1".
    type: Proposed Standard
    year: "1997"
    status: obsolete
    topics:
