  - title: JavaScript Object Notation (JSON) Text Sequences - RFC 7464
    asciidocfile: rfc7464-javascript-object-notation-json-text-sequences.adoc
    year: "2015"
    status: active
    type: Proposed Standard
    url: https://datatracker.ietf.org/doc/html/rfc7464
    description: |
      This document describes the JavaScript Object Notation (JSON) text
      sequence format and associated media type "application/json-seq".  A JSON
      text sequence consists of any number of JSON texts, all encoded  in UTF-8,
      each prefixed by an ASCII Record Separator (0x1E),  and each ending with
      an ASCII Line Feed character (0x0A).
    topics:
      - Data Interchange Format
  - title: 'Linkset: Media Types and a Link Relation Type for Link Sets - RFC 9264'
    asciidocfile: rfc-9264-linkset-media-types-and-a-link-relation-type-for-link-sets.adoc
