  - title: 'Communicating Presentation Information in Internet Messages: The Content-Disposition Header Field - RFC 2183'
    asciidocfile: rfc-2183-communicating-presentation-information-in-internet-messages-the-content-disposition-header-field.adoc
    year: "1997"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc2183
    description: |
      This memo provides a mechanism whereby messages conforming to the MIME
      specifications [RFC 2045, RFC 2046, RFC 2047, RFC 2048, RFC 2049]  can
      convey presentational information. It specifies the "Content-Disposition"
      header field, which is optional and valid for any MIME entity  ("message"
      or &quot;body part&quot;). Two values for this header field  are described
      in this memo; one for the ordinary linear presentation of  the body part,
      and another to facilitate the use of mail to transfer  files. It is
      expected that more values will be defined in the future,  and procedures
      are defined for extending this set of values.

      This document is intended as an extension to MIME.  As such, the reader is
      assumed to be familiar with the MIME specifications, and RFC 822.  The
      information presented herein supplements but does not replace that found
      in those documents.

      This document is a revision to the Experimental protocol defined in RFC
      1806.  As compared to RFC 1806, this document contains minor editorial
      updates, adds new parameters needed to support the File Transfer Body
      Part, and references a separate specification for the handling of
      non-ASCII and/or very long parameter values.
    type: Proposed Standard
    topics:
      - HTTP Header
  - title: Expect-CT Extension for HTTP - RFC 9163
    asciidocfile: rfc-9163-expect-ct-extension-for-http.adoc
    year: "2022"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc9163/
    description: |
      This document defines a new HTTP header field named "Expect-CT", which
      allows web host operators  to instruct user agents (UAs) to expect valid
      Signed Certificate Timestamps (SCTs) to be served  on connections to these
      hosts. Expect-CT allows web host operators to discover misconfigurations
      in their Certificate Transparency (CT) deployments. Further, web host
      operators can use Expect-CT  to ensure that if a UA that supports
      Expect-CT accepts a misissued certificate, that certificate  will be
      discoverable in Certificate Transparency logs.
    type: Experimental
    topics:
      - HTTP Header
      - Security
  - title: Forwarded HTTP Extension - RFC 7239
    asciidocfile: rfc-7239-forwarded-http-extension.adoc
    year: "2014"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc7239
    description: |
      This document defines an HTTP extension header field that allows proxy
      components to disclose information lost in the proxying process, for
      example, the originating IP address of a request or IP address of the
      proxy on the user-agent-facing interface. In a path of proxying
      components, this makes it possible to arrange it so that each subsequent
      component will have access to, for example, all IP addresses used in  the
      chain of proxied HTTP requests.

      This document also specifies guidelines for a proxy administrator to
      anonymize the origin of a request.
    type: Proposed Standard
    topics:
      - HTTP Protocol
  - title: HTTP Cache-Control Extensions for Stale Content - RFC 5861
    asciidocfile: rfc-5861-http-cache-control-extensions-for-stale-content.adoc
    year: "2011"
