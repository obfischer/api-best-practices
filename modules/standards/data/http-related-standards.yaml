      - April Joke
      - Coffee
  - title: The JSON data interchange syntax - ECMA-404
    asciidocfile: ecma-404-the-json-data-interchange-syntax.adoc
    description: |
      JSON is a lightweight, text-based, language-independent syntax for
      defining data interchange formats. It was derived from the ECMAScript
      programming language, but is programming language independent. JSON
      defines a small set of structuring rules for the portable  representation
      of structured data.

      The goal of this specification is only to define the syntax of valid  JSON
      texts. Its intent is not to provide any semantics or interpretation  of
      text conforming to that syntax. It also intentionally does not define how
      a valid JSON text might be internalized into the data structures  of a
      programming language. There are many possible semantics that  could be
      applied to the JSON syntax and many ways that a JSON text can be processed
      or mapped by a programming language.  Meaningful interchange of
      information using JSON requires agreement  among the involved parties on
      the specific semantics to be applied.  Defining specific semantic
      interpretations of JSON is potentially a topic for other specifications.
      Similarly, language mappings of JSON can also be independently specified.
      For example, ECMA-262 defines mappings between valid JSON texts and
      ECMAScript’s runtime  data structures.
    year: "2017"
    status: active
    type: Published Standard
    url: https://ecma-international.org/publications-and-standards/standards/ecma-404/
    topics:
      - Data Interchange Format
  - title: The JavaScript Object Notation (JSON) Data Interchange Format - RFC 8259
    asciidocfile: rfc-8259-the-javascript-object-notation-json-data-interchange-format.adoc
    year: "2017"
    status: active
    type: Internet Standard
    url: https://datatracker.ietf.org/doc/html/rfc8259
    description: |
      JavaScript Object Notation (JSON) is a lightweight, text-based,
      language-independent data interchange format. It was derived from the
      ECMAScript Programming Language Standard. JSON defines a small set  of
      formatting rules for the portable representation of structured  data.

      This document removes inconsistencies with other specifications  of JSON,
      repairs specification errors, and offers experience-based
      interoperability guidance.
    topics:
      - Data Interchange Format
  - title: The Sunset HTTP Header Field - RFC 8594
    asciidocfile: rfc-8594-the-sunset-http-header-field.adoc
    year: "2019"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc8594
    description: |
      This specification defines the Sunset HTTP response header field, which
      indicates  that a URI is likely to become unresponsive at a specified
      point in the future.  It also defines a sunset link relation type that
      allows linking to resources  providing information about an upcoming
      resource or service sunset.
    type: Informational
    topics:
      - HTTP Header
      - Life Cycle Management
  - title: The Transport Layer Security (TLS) Protocol Version 1.2 - RFC 5246
    asciidocfile: rfc-5246-the-transport-layer-security-tls-protocol-version-1.2.adoc
    year: "2008"
    status: Proposed Standard
    url: https://datatracker.ietf.org/doc/html/rfc5246
    description: |
      This document specifies Version 1.2 of the Transport Layer Security (TLS)
      protocol. The TLS protocol provides communications security over the
      Internet. The protocol allows client/server applications to communicate in
      a way that is designed to prevent eavesdropping, tampering, or message
      forgery.
    type: Proposed Standard
    topics:
      - Security
  - title: The Transport Layer Security (TLS) Protocol Version 1.3 - RFC 8446
    asciidocfile: rfc-8446-the-transport-layer-security-tls-protocol-version-1.3.adoc
    year: "2018"
    status: Proposed Standard
    url: https://datatracker.ietf.org/doc/html/rfc8446
    description: |
      This document specifies version 1.3 of the Transport Layer Security (TLS)
      protocol. TLS allows client/server applications to communicate over the
      Internet in a way that is designed to prevent eavesdropping, tampering,
      and message forgery.

      This document updates RFCs 5705 and 6066, and  obsoletes RFCs 5077, 5246,
      and 6961. This document also specifies  new requirements for TLS 1.2
      implementations.
    type: Proposed Standard
    topics:
      - Security
  - title: The Web Origin Concept - RFC 6454
    asciidocfile: rfc-6454-the-web-origin-concept.adoc
    year: "2011"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc6454
    description: |
      This document defines the concept of an "origin", which is often used  as
      the scope of authority or privilege by user agents. Typically,  user
      agents isolate content retrieved from different origins to prevent
      malicious web site operators from interfering with the operation of benign
      web sites. In addition to outlining the principles that  underlie the
      concept of origin, this document details how to determine the origin of a
      URI and how to serialize an origin into a string.  It also defines an HTTP
      header field, named "Origin,  that indicates which origins are associated
      with an HTTP request.
    type: Proposed Standard
    topics:
      - Security
  - title: The WebSocket Protocol - RFC 6455
    asciidocfile: rfc-6455-the-websocket-protocol.adoc
    year: "2011"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc6455
    description: |
      The WebSocket Protocol enables two-way communication between a client
      running untrusted code in a controlled environment to a remote host  that
      has opted-in to communications from that code. The security model  used
      for this is the origin-based security model commonly used by  web
      browsers. The protocol consists of an opening handshake followed  by basic
      message framing, layered over TCP. The goal of this technology  is to
      provide a mechanism for browser-based applications that need  two-way
      communication with servers that does not rely on opening  multiple HTTP
      connections (e.g., using XMLHttpRequest or <iframe>s  and long polling).
    type: Proposed Standard
    topics:
      - WebSocket
  - title: Transport Layer Security (TLS) Application-Layer Protocol Negotiation Extension - RFC 7301
    asciidocfile: rfc-7301-transport-layer-security-tls-application-layer-protocol-negotiation-extension.adoc
    year: "2014"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc7301
    description: |
      This document describes a Transport Layer Security (TLS) extension for
      application-layer protocol negotiation within the TLS handshake. For
      instances in which multiple application protocols are supported on the
      same TCP or UDP port, this extension allows the application layer to
      negotiate which protocol will be used within the TLS connection.
    type: Proposed Standard
    topics:
      - Security
  - title: 'Uniform Resource Identifier (URI): Generic Syntax - RFC 3986'
    asciidocfile: rfc-3986-uniform-resource-identifier-uri-generic-syntax.adoc
    year: "2005"
    status: active
    type: Internet Standard
    url: https://datatracker.ietf.org/doc/html/rfc3986
    description: |
      A Uniform Resource Identifier (URI) is a compact sequence of characters
      that identifies an abstract or physical resource. This specification
      defines the generic URI syntax and a process for resolving URI references
      that might be in relative form, along with guidelines and security
      considerations for the use of URIs on the Internet. The URI syntax
      defines a grammar that is a superset of all valid URIs, allowing an
      implementation to parse the common components of a URI reference without
      knowing the scheme-specific requirements of every possible identifier.
      This specification does not define a generative grammar for URIs; that
      task is performed by the individual specifications of each URI scheme.
    topics:
      - Identifiers
  - title: Upgrading to TLS Within HTTP/1.1 - RFC 2817
    asciidocfile: rfc-2817-upgrading-to-tls-within-http-1.1.adoc
    year: "2000"
    status: active
    type: Proposed Standard
    url: https://datatracker.ietf.org/doc/html/rfc2817
    description: |
      This memo explains how to use the Upgrade mechanism in HTTP/1.1 to
      initiate  Transport Layer Security (TLS) over an existing TCP connection.
      This  allows unsecured and secured HTTP traffic to share the same well
      known  port (in this case, http: at 80 rather than https: at 443). It also
      enables "virtual hosting", so a single HTTP + TLS server can disambiguate
      traffic intended for several hostnames at a single IP address.

      Since HTTP/1.1 defines Upgrade as a hop-by-hop mechanism, this memo also
      documents the HTTP CONNECT method for establishing end-to-end tunnels
      across HTTP proxies. Finally, this memo establishes new IANA registries
      for public HTTP status codes, as well as public or private Upgrade
      product tokens.
    topics:
      - Security
  - title: Use and Interpretation of HTTP Version Numbers - RFC 2145
    asciidocfile: rfc-2145-use-and-interpretation-of-http-version-numbers.adoc
    year: "1997"
    status: active
    type: Informational
    url: https://datatracker.ietf.org/doc/html/rfc2145
    description: |
      HTTP request and response messages include an HTTP protocol version
      number.  Some confusion exists concerning the proper use and
      interpretation of HTTP version numbers, and concerning interoperability of
      HTTP implementations  of different protocol versions. This document is an
      attempt to clarify  the situation. It is not a modification of the
      intended meaning of the  existing HTTP/1.0 and HTTP/1.1 documents, but it
      does describe the  intention of the authors of those documents, and can be
      considered  definitive when there is any ambiguity in those documents
      concerning  HTTP version numbers, for all versions of HTTP.
    topics:
      - Versioning
      - HTTP Protocol
  - title: Use of the Content-Disposition Header Field in the Hypertext Transfer Protocol (HTTP) - RFC 6266
    asciidocfile: rfc-6266-use-of-the-content-disposition-header-field-in-the-hypertext-transfer-protocol-http.adoc
    year: "2011"
    status: active
    type: Proposed Standard
    url: https://datatracker.ietf.org/doc/html/rfc6266
    description: |
      RFC 2616 defines the Content-Disposition response header field, but points
      out that it is not part of the HTTP/1.1 Standard. This specification
      takes over the definition and registration of Content- Disposition, as
      used in HTTP, and clarifies internationalization aspects.
    topics:
      - HTTP Header
  - title: Web Linking - RFC 5988
    asciidocfile: rfc-5988-web-linking.adoc
    year: "2010"
    status: obsolete
    url: https://datatracker.ietf.org/doc/html/rfc5988
    description: |
      This document specifies relation types for Web links, and defines a
      registry for them. It also defines the use of such links in HTTP headers
      with the Link header field.
    type: Proposed Standard
    topics:
      - HTTP Header
      - Linking
  - title: Web Linking - RFC 8288
    asciidocfile: rfc-8288-web-linking.adoc
    year: "2017"
    status: active
    type: Proposed Standard
    url: https://datatracker.ietf.org/doc/html/rfc8288
    description: |
      This specification defines a model for the relationships between resources
      on the Web ("links") and the type of those relationships  ("link relation
      types").

      It also defines the serialisation  of such links in HTTP headers with the
      Link header field.
    topics:
      - HTTP Header
      - Linking
  - title: XML Schema 1.1
    asciidocfile: xml-schema-1.1.adoc
    description: |
      XML Schemas express shared vocabularies and allow machines to carry out
      rules made by people. They provide a means for defining the structure,
      content and semantics of XML documents.
    status: active
    year: "2012"
    type: W3C Recommendation
    url: https://www.w3.org/XML/Schema
    topics:
      - Schema language
  - title: YAML Ain’t Markup Language (YAML™) version 1.2.2
    asciidocfile: yaml-aint-markup-language-yaml-version-1.2.2.adoc
    description: |
      This is the YAML specification v1.2.2. It defines the YAML 1.2 data
      language. There are no normative changes from the YAML specification
      v1.2. The primary objectives of this revision are to correct errors  and
      add clarity.

      This revision also strives to make the YAML language development process
      more open, more transparent and easier for people to contribute to. The
      input format is now Markdown instead of DocBook, and the images are  made
      from plain text LaTeX files rather than proprietary drawing  software. All
      the source content for the specification is publicly  hosted.

      The previous YAML specification3 was published 12 years ago. In that  time
      span, YAML’s popularity has grown significantly. Efforts are  ongoing to
      improve the language and grow it to meet the needs  and expectations of
      its users. While this revision of the specification  makes no actual
      changes to YAML, it begins a process by which the  language intends to
      evolve and stay modern.
    year: "2021"
    status: active
    type: Published Standard
    url: https://yaml.org/spec/1.2.2/
    topics:
      - Data Interchange Format
