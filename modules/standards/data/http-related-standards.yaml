  - title: HTTP Caching - RFC 9111
    asciidocfile: rfc-9111-http-caching.adoc
    year: "2022"
    status: active
    type: Internet Standard
    url: https://datatracker.ietf.org/doc/html/rfc9111
    description: |
      The Hypertext Transfer Protocol (HTTP) is a stateless application-level
      protocol for distributed, collaborative, hypertext information systems.
      This document defines HTTP caches and the associated header fields  that
      control cache behavior or indicate cacheable response messages.
    topics:
      - Caching
  - title: HTTP Header Field X-Frame-Options - RFC 7034
    asciidocfile: rfc-7034-http-header-field-x-frame-options.adoc
    year: "2013"
    status: active
    type: Informational
    url: https://datatracker.ietf.org/doc/html/rfc7034
    description: |
      To improve the protection of web applications against clickjacking,  this
      document describes the X-Frame-Options HTTP header field, which  declares
      a policy, communicated from the server to the client browser,  regarding
      whether the browser may display the transmitted content in  frames that
      are part of other web pages.
    topics:
      - Security
      - HTTP Header
  - title: HTTP Immutable Responses
    asciidocfile: rfc-8246-http-immutable-responses.adoc
    year: "2017"
    description: |
      The immutable HTTP response Cache-Control extension allows servers to
      identify resources that will not be updated during their freshness
      lifetime.  This ensures that a client never needs to revalidate a cached
      fresh resource to be certain it has not been modified.
    status: active
    type: HTTP Immutable Responses - RFC 8246
    url: https://datatracker.ietf.org/doc/html/rfc8246
    topics:
      - HTTP Protocol
  - title: HTTP Origin-Bound Authentication (HOBA) - RFC 7486
    asciidocfile: rfc-7486-http-origin-bound-authentication-hoba.adoc
    year: "2015"
    status: active
    type: Experimental
    url: https://datatracker.ietf.org/doc/html/rfc7486
    description: |
      HTTP Origin-Bound Authentication (HOBA) is a digital-signature-based
      design for an HTTP authentication method. The design can also be used in
      JavaScript-based authentication embedded in HTML. HOBA is an alternative
      to HTTP authentication schemes that require passwords and therefore
      avoids all problems related to passwords, such as leakage of  server-side
      password databases.
    topics:
      - Authentication
      - Security
  - title: HTTP Semantics - RFC 9110
    asciidocfile: rfc-9110-http-semantics.adoc
    year: "2022"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc9110
    description: |
      The Hypertext Transfer Protocol (HTTP) is a stateless application-level
      protocol for distributed, collaborative, hypertext information systems.
      This document describes the overall architecture of HTTP, establishes
      common terminology, and defines aspects of the protocol that are shared
      by all versions. In this definition are core protocol elements,
      extensibility mechanisms, and the "http" and "https" Uniform Resource
      Identifier (URI) schemes.
    type: Internet Standard
    topics:
      - HTTP Protocol
  - title: HTTP State Management Mechanism - RFC 6265
    asciidocfile: rfc-6265-http-state-management-mechanism.adoc
    year: "2011"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc6265
    description: |
      This document defines the HTTP Cookie and Set-Cookie header fields.  These
      header fields can be used by HTTP servers to store state  (called cookies)
      at HTTP user agents, letting the servers maintain  a stateful session over
      the mostly stateless HTTP protocol. Although cookies have many historical
      infelicities that degrade their  security and privacy, the Cookie and
      Set-Cookie header fields are  widely used on the Internet. This document
      obsoletes RFC 2965.
    type: Proposed Standard
    topics:
      - Cookies
