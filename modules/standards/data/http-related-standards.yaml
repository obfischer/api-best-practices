      - Life Cycle Management
  - title: The Hyper Text Coffee Pot Control Protocol for Tea Efflux Appliances (HTCPCP-TEA) - RFC 7168
    asciidocfile: rfc-7168-the-hyper-text-coffee-pot-control-protocol-for-tea-efflux-appliances-htcpcp-tea.adoc
