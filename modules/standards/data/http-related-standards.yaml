  - title: The Deprecation HTTP Response Header Field - RFC 8594
    asciidocfile: rfc-8594-the-deprecation-http-response-header-field.adoc
    year: "2025"
    status: active
    url: https://datatracker.ietf.org/doc/html/rfc9745
    description: |
      The Deprecation HTTP response header field is used to signal to consumers
      of a resource (identified by a URI) that the resource will be or has been
      deprecated. Additionally, the deprecation link relation can be used to
      link to a resource that provides further information about planned or
      existing deprecation. It may also  provide ways in which client
      application developers can best manage deprecation.
    type: Proposed Standard
    topics:
